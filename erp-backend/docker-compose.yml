version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-123456}
      MYSQL_DATABASE: ${DB_NAME:-erp_mini3}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASS:-123456}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-8888}
      
      # Database (internal docker-compose)
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-123456}
      DB_NAME: ${DB_NAME:-erp_mini3}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersupersecret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      SALT_ROUNDS: ${SALT_ROUNDS:-10}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      
      # Email
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      
      # AI Chatbot
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      CHATBOT_CONTEXT_WINDOW: ${CHATBOT_CONTEXT_WINDOW:-20}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8888/api}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-false}
    
    ports:
      - "${PORT:-8888}:${PORT:-8888}"
    
    networks:
      - erp-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8888}/health"]
      timeout: 10s
      retries: 5
      interval: 30s

volumes:
  mysql_data:
    driver: local

networks:
  erp-network:
    driver: bridge
