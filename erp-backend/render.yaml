services:
  - type: web
    name: erp-backend
    runtime: docker
    plan: standard
    
    # Build configuration - using docker-compose
    dockerfilePath: ./Dockerfile
    
    # Environment variables
    envVars:
      # Server Configuration
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8888
      - key: LOG_LEVEL
        value: info
      
      # Database Configuration (Docker Compose)
      - key: DB_HOST
        value: mysql
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: root
      - key: DB_PASS
        sync: false  # Set in Render dashboard for security
      - key: DB_NAME
        value: erp_mini3
      
      # CORS Configuration
      - key: CORS_ORIGINS
        value: https://yourdomain.com,https://www.yourdomain.com
      
      # JWT Configuration
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_REFRESH_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: SALT_ROUNDS
        value: "10"
      
      # Email Configuration (SMTP)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false  # Set in Render dashboard
      - key: SMTP_PASS
        sync: false  # Set in Render dashboard
      
      # Cloudinary Configuration
      - key: CLOUDINARY_CLOUD_NAME
        value: doxn6ztxq
      - key: CLOUDINARY_API_KEY
        sync: false  # Set in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false  # Set in Render dashboard
      
      # AI Chatbot Configuration
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: LLM_API_KEY
        sync: false  # Set in Render dashboard
      - key: LLM_TIMEOUT_MS
        value: "30000"
      - key: CHATBOT_CONTEXT_WINDOW
        value: "20"
      - key: APP_BASE_URL
        value: https://yourdomain.com/api
      - key: USE_MOCK_LLM
        value: "false"
    
    # Health check
    healthCheckPath: /health
    
    # Scaling
    numInstances: 1
    
    # Disk for uploads
    disk:
      name: erp-backend-disk
      mountPath: /app/uploads
      sizeGB: 10

# Note: For docker-compose deployment on Render:
# 1. Render will use docker-compose.yml if present
# 2. Make sure docker-compose.yml is in the root directory
# 3. Services defined in docker-compose.yml will be deployed together
# 4. Environment variables from render.yaml will be passed to docker-compose services
