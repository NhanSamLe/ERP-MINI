services:
  - type: web
    name: erp-backend
    runtime: docker
    plan: free
    
    # Build configuration - Render will use docker-compose.yml
    dockerfilePath: ./Dockerfile
    
    # Environment variables
    envVars:
      # Server Configuration
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      
      # Database Configuration (Docker Compose MySQL)
      - key: DB_HOST
        value: mysql
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: root
      - key: DB_PASS
        sync: false  # Set in Render dashboard
      - key: DB_NAME
        value: erp_mini3
      
      # CORS Configuration
      - key: CORS_ORIGINS
        value: https://yourdomain.onrender.com
      
      # JWT Configuration
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: SALT_ROUNDS
        value: "10"
      
      # Email Configuration
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      
      # Cloudinary Configuration
      - key: CLOUDINARY_CLOUD_NAME
        value: doxn6ztxq
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      
      # AI Chatbot Configuration
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: LLM_API_KEY
        sync: false
      - key: LLM_TIMEOUT_MS
        value: "30000"
      - key: CHATBOT_CONTEXT_WINDOW
        value: "20"
      - key: APP_BASE_URL
        value: https://yourdomain.onrender.com/api
      - key: USE_MOCK_LLM
        value: "false"
    
    # Health check
    healthCheckPath: /health
    
    # Scaling
    numInstances: 1
#     plan: standard
#     version: "8.0"  # MySQL version
#     ipAllowList: []  # Allow all IPs from Render services

