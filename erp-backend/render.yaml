services:
  - type: web
    name: erp-backend
    runtime: docker
    plan: free  # FREE TIER
    
    # Build configuration - using docker-compose
    dockerfilePath: ./Dockerfile
    
    # Environment variables
    envVars:
      # Server Configuration
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      
      # Database Configuration (Docker Compose)
      - key: DB_HOST
        value: mysql
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: root
      - key: DB_PASS
        sync: false  # Set in Render dashboard for security
      - key: DB_NAME
        value: erp_mini3
      
      # CORS Configuration
      - key: CORS_ORIGINS
        value: https://yourdomain.onrender.com
      
      # JWT Configuration
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_REFRESH_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: SALT_ROUNDS
        value: "10"
      
      # Email Configuration (SMTP)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false  # Set in Render dashboard
      - key: SMTP_PASS
        sync: false  # Set in Render dashboard
      
      # Cloudinary Configuration
      - key: CLOUDINARY_CLOUD_NAME
        value: doxn6ztxq
      - key: CLOUDINARY_API_KEY
        sync: false  # Set in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false  # Set in Render dashboard
      
      # AI Chatbot Configuration
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: LLM_API_KEY
        sync: false  # Set in Render dashboard
      - key: LLM_TIMEOUT_MS
        value: "30000"
      - key: CHATBOT_CONTEXT_WINDOW
        value: "20"
      - key: APP_BASE_URL
        value: https://yourdomain.onrender.com/api
      - key: USE_MOCK_LLM
        value: "false"
    
    # Health check (required for free tier to prevent spin-down)
    healthCheckPath: /health
    
    # Scaling - FREE TIER: max 1 instance
    numInstances: 1
    
    # NO DISK for free tier (use SQLite or external storage)
    # disk:
    #   name: erp-backend-disk
    #   mountPath: /app/uploads
    #   sizeGB: 1

# ⚠️ IMPORTANT NOTES FOR FREE TIER:
# 1. Free tier services spin down after 15 minutes of inactivity
# 2. First request after spin-down takes 30+ seconds
# 3. No persistent disk storage - use Cloudinary for file uploads
# 4. Limited to 1 instance
# 5. 0.5 GB RAM, shared CPU
# 6. Keep health check endpoint active to prevent spin-down
# 7. Consider using external database (Railway, Supabase) instead of docker-compose MySQL
#
# RECOMMENDATIONS:
# - Use Railway or Supabase for database (free tier available)
# - Use Cloudinary for file uploads (already configured)
# - Add keep-alive service to prevent spin-down
# - Monitor performance and upgrade if needed
#     plan: standard
#     version: "8.0"  # MySQL version
#     ipAllowList: []  # Allow all IPs from Render services

