name: Deploy to AWS EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: erp-frontend/package-lock.json

      - name: Install deps
        working-directory: erp-frontend
        run: npm ci

      - name: Build
        working-directory: erp-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Package dist
        working-directory: erp-frontend
        run: tar -czf dist.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: erp-frontend/dist.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload frontend build
        run: |
          scp -i ~/.ssh/deploy_key dist.tar.gz \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/dist.tar.gz"

      - name: Deploy frontend on EC2
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            rm -rf ~/dist_new && mkdir ~/dist_new
            tar -xzf ~/dist.tar.gz -C ~/dist_new
            sudo rm -rf /var/www/erp/*
            sudo cp -r ~/dist_new/* /var/www/erp/
            sudo chown -R nginx:nginx /var/www/erp
            rm -rf ~/dist_new ~/dist.tar.gz
            echo "Frontend deployed OK"
          '

      - name: Deploy backend on EC2
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd ~/erp
            git fetch origin master
            git reset --hard origin/master
            cd erp-backend
            npm ci
            npm run build
            npm run migrate || echo "(khong co migration moi)"
            pm2 restart erp-backend
            echo "Backend deployed OK"
          '
